name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyD1G5I7gnGqxybT2EYWATY6wtTrjQ4gqHU
          VITE_FIREBASE_AUTH_DOMAIN: velabudget.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: velabudget
          VITE_FIREBASE_STORAGE_BUCKET: velabudget.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "77571856579"
          VITE_FIREBASE_APP_ID: "1:77571856579:web:a4de114a3cd3715c3aaa76"
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
